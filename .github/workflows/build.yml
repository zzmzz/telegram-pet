name: Build Desktop Pet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          pip install PySide6 telethon qasync pyinstaller
          pip install "tomli>=2.0.0"

      - name: Build
        shell: bash
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramPet-Windows
          path: dist/TelegramPet.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PySide6 telethon qasync pyinstaller
          pip install "tomli>=2.0.0"

      - name: Build
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramPet-macOS
          path: dist/TelegramPet

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Zip macOS binary
        run: cd TelegramPet-macOS && chmod +x TelegramPet && zip ../TelegramPet-macOS.zip TelegramPet && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TelegramPet-Windows/TelegramPet.exe
            TelegramPet-macOS.zip
          generate_release_notes: true
